<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Face Recognition App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: rgba(0, 0, 0, 0.35);
      --accent: #7efff5;
      --accent2: #a78bfa;
      --text-primary: #f0f4ff;
      --text-muted: rgba(200, 210, 255, 0.55);
      --glow: rgba(126, 255, 245, 0.18);
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: #06070f;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(100, 60, 200, 0.28) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 80%, rgba(30, 180, 210, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 55% 40% at 50% 50%, rgba(126, 255, 245, 0.07) 0%, transparent 60%),
        #06070f;
      overflow: hidden;
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: float linear infinite;
      opacity: 0.45;
    }
    .orb1 { width: 420px; height: 420px; background: rgba(100, 60, 200, 0.55); top: -120px; left: -80px; animation-duration: 18s; }
    .orb2 { width: 300px; height: 300px; background: rgba(30, 210, 200, 0.45); bottom: -80px; right: -60px; animation-duration: 22s; animation-delay: -6s; }
    .orb3 { width: 200px; height: 200px; background: rgba(167, 139, 250, 0.4); top: 50%; left: 55%; animation-duration: 14s; animation-delay: -3s; }

    @keyframes float {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(30px, -40px) scale(1.07); }
      66%  { transform: translate(-20px, 30px) scale(0.95); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* Grid lines */
    .grid-lines {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: slideDown 0.8s cubic-bezier(.16,1,.3,1) both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(126, 255, 245, 0.1);
      border: 1px solid rgba(126, 255, 245, 0.25);
      border-radius: 100px;
      padding: 5px 16px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 22px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0f4ff 0%, var(--accent) 55%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Glass card ── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 40px 36px;
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px var(--glass-shadow),
        0 0 60px var(--glow);
      animation: slideUp 0.9s cubic-bezier(.16,1,.3,1) 0.1s both;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Drop zone ── */
    .dropzone-label {
      display: block;
      border: 1.5px dashed rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      background: rgba(255,255,255,0.03);
      position: relative;
      overflow: hidden;
    }
    .dropzone-label::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(126,255,245,0.07), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .dropzone-label:hover,
    .dropzone-label.active {
      border-color: rgba(126, 255, 245, 0.45);
      background: rgba(126, 255, 245, 0.05);
      box-shadow: 0 0 30px rgba(126,255,245,0.1);
    }
    .dropzone-label:hover::before,
    .dropzone-label.active::before { opacity: 1; }

    .drop-icon {
      width: 56px; height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, rgba(126,255,245,0.18), rgba(167,139,250,0.18));
      border: 1px solid rgba(126,255,245,0.2);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .dropzone-label:hover .drop-icon {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 30px rgba(126,255,245,0.2);
    }
    .drop-icon svg { width: 26px; height: 26px; }

    .drop-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .drop-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 300;
    }
    .drop-sub span {
      color: var(--accent);
      font-weight: 500;
    }

    input[type="file"] { display: none; }

    /* File count pill */
    .file-info {
      margin-top: 16px;
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
      transition: all 0.3s;
    }
    .file-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(126,255,245,0.12);
      border: 1px solid rgba(126,255,245,0.2);
      border-radius: 100px;
      padding: 3px 12px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 500;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.35s, transform 0.35s;
    }
    .file-pill.visible { opacity: 1; transform: scale(1); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 28px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }
    .divider-text {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Submit button ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 28px;
      border: none;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #4ff0e2 0%, #7c6dfa 100%);
      color: #06070f;
      box-shadow: 0 4px 24px rgba(79,240,226,0.3), 0 1px 0 rgba(255,255,255,0.2) inset;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s;
    }
    .btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: skewX(-20deg);
      transition: left 0.55s ease;
    }
    .btn:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 36px rgba(79,240,226,0.42), 0 1px 0 rgba(255,255,255,0.2) inset; }
    .btn:hover::before { left: 150%; }
    .btn:active { transform: scale(0.98); }

    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 32px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      animation: slideUp 1s cubic-bezier(.16,1,.3,1) 0.3s both;
    }
    .footer-note a { color: var(--accent); text-decoration: none; }

    /* ── Shimmer on card top border ── */
    .card-shine {
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(126,255,245,0.5) 50%, transparent 100%);
      border-radius: 28px 28px 0 0;
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 560px) {
      .card { padding: 30px 22px; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="grid-lines"></div>
  </div>

  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="badge"><span class="badge-dot"></span>AI-Powered</div>
      <h1>Face Recognition</h1>
      <p class="subtitle">Upload your images and let our neural engine identify and analyse every face with precision.</p>
    </header>

    <!-- Card -->
    <div class="card" style="position:relative;">
      <div class="card-shine"></div>

      <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm">

        <!-- Drop zone -->
        <label class="dropzone-label" for="fileInput" id="dropzone">
          <div class="drop-icon">
            <!-- Upload SVG icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#7efff5"/>
                  <stop offset="100%" style="stop-color:#a78bfa"/>
                </linearGradient>
              </defs>
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
          </div>
          <p class="drop-title">Drop images here</p>
          <p class="drop-sub">or <span>browse files</span> from your device</p>
          <input type="file" name="images" id="fileInput" multiple accept="image/*"/>
        </label>

        <!-- File count feedback -->
        <div class="file-info" id="fileInfo">
          <div class="file-pill" id="filePill">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span id="fileCount">0 files selected</span>
          </div>
        </div>

        <!-- Divider -->
        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">Ready to analyse</span>
          <div class="divider-line"></div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Analyse Faces
        </button>

      </form>
    </div>

    <p class="footer-note">Images are processed securely &amp; never stored. <a href="#">Privacy Policy</a></p>

  </div>

  <script>
    const input    = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const pill     = document.getElementById('filePill');
    const count    = document.getElementById('fileCount');

    input.addEventListener('change', () => {
      const n = input.files.length;
      if (n > 0) {
        count.textContent = n + (n === 1 ? ' file selected' : ' files selected');
        pill.classList.add('visible');
      } else {
        pill.classList.remove('visible');
      }
    });

    // Drag-over visual feedback
    ['dragenter','dragover'].forEach(evt => {
      dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('active'); });
    });
    ['dragleave','drop'].forEach(evt => {
      dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('active'); });
    });
  </script>
</body>
</html>
